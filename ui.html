<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>styles</title>

    <link rel="stylesheet" href="./styles/variables.css" />
    <link rel="stylesheet" href="./styles/globals.css" />
    <link rel="stylesheet" href="./styles/ui.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--font family-->
    <link
      href="https://fonts.googleapis.com/css2?family=Forum&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <!--font family-->
  </head>
  <body>
    <div class="block-one">
      <section class="inputs-section">
        <!--email-->
        <label class="text-input">
          <span class="text-input__label">Text Field</span>
          <input class="text-input__input" placeholder="Email" />
        </label>
        <!--email-->

        <!--dropdown-->
        <div class="dropdown">
          <span class="dropdown__label">Dropdown</span>
          <div class="dropdown__trigger">
            <input
              class="dropdown__input"
              readonly
              placeholder="Сколько гостей"
            />
          </div>
        </div>
        <!--dropdown-->

        <!--date-input-->
        <label class="text-input">
          <span class="text-input__label">masked text field</span>
          <input
            class="text-input__input"
            placeholder="ДД.ММ.ГГГГ"
            pattern="\d{2}\.\d{2}\.\d{4}"
          />
        </label>
        <!--date-input-->

        <!--dropdown-->
        <div class="date-row">
          <div class="dropdown">
            <span class="dropdown__label">Dropdown</span>
            <div class="dropdown__trigger">
              <input
                class="dropdown__input"
                readonly
                placeholder="ДД.ММ.ГГГГ"
                pattern="\d{2}\.\d{2}\.\d{4}"
              />
            </div>
          </div>
          <div class="dropdown">
            <span class="dropdown__label">Dropdown</span>
            <div class="dropdown__trigger">
              <input
                class="dropdown__input"
                readonly
                placeholder="19.08.2019"
                pattern="\d{2}\.\d{2}\.\d{4}"
              />
            </div>
          </div>
        </div>
        <!--dropdown-->

        <!--dropdown-->
        <div class="dropdown-middle">
          <div class="dropdown">
            <span class="dropdown__label">date Dropdown</span>
            <div class="dropdown__trigger">
              <input
                class="dropdown__input"
                readonly
                placeholder="19 авг - 23 авг"
              />
            </div>
          </div>
          <!--dropdown-->

          <!--text-input-subscription__button-->
          <label class="text-input-subscription"
            ><span class="text-input-subscription__label"
              >subscription text field</span
            >
            <input
              class="text-input-subscription__input"
              type="email"
              readonly
              placeholder="Email"
            />
            <button type="submit" class="text-input-subscription__button">
              <img
                class="text-input-subscription__button__img"
                src="./img/arrow_forward.png"
                alt=""
              />
            </button>
          </label>
        </div>
        <!--text-input-subscription__button-->
      </section>

      <!--controls-section-->
      <section class="controls-section" id="check">
        <!--check box-->
        <h3 class="filter-group__title">Checkbox Buttons</h3>
        <div class="filter-group__items">
          <label class="checkbox">
            <input type="checkbox" class="checkbox__input" />
            <span class="checkbox__mark"></span>
            <span class="checkbox__label">Можно курить</span>
          </label>

          <label class="checkbox">
            <input type="checkbox" class="checkbox__input" />
            <span class="checkbox__mark"></span>
            <span class="checkbox__label">Можно с питомцами</span>
          </label>

          <label class="checkbox">
            <input type="checkbox" class="checkbox__input" />
            <span class="checkbox__mark"></span>
            <span class="checkbox__label">
              Можно пригласить гостей (до 10 человек)</span
            >
          </label>
        </div>
        <!--check box-->

        <!--Radio Buttons-->
        <div class="radio-buttons">
          <h3 class="radio-buttons__lable">Radio Buttons</h3>
          <form class="radio-buttons__form">
            <input
              class="radio-buttons__input"
              type="radio"
              id="option1"
              name="options"
              value="1"
              checked
            />
            <label for="option1">Мужчина</label>
            <input
              class="radio-buttons__input"
              type="radio"
              id="option2"
              name="options"
              value="2"
            />
            <label for="option2"> Женщина</label>
          </form>
        </div>
        <!--Radio Buttons-->

        <!--Toggle Buttons-->
        <h3 class="checkbox-toggle__lable">Toggle</h3>
        <div>
          <label class="checkbox-toggle">
            <input type="checkbox" />
            <span class="checkbox-toggle__span"></span>
            Получать спецпредложения
          </label>
        </div>
        <!--Toggle Buttons-->

        <!--Like Buttons-->
        <h3 class="buttons-like__title">like button</h3>

        <label class="buttons-like__label">
          <input type="checkbox" class="buttons-like__input" />
          <div class="buttons-like__form">
            <img
              class="buttons-like__img"
              src="./img/buttons_heart.svg"
              alt="like"
            />
            <img
              class="buttons-like__img-heart"
              src="./img/buttons_heart_point.svg"
              alt="like"
            />
            <span class="buttons-like__span">0</span>
          </div>
        </label>
        <!--Like Buttons-->

        <!--Rate Buttons-->
        <h3 class="buttons-rate__title">rate button</h3>

        <div class="buttons-rate">
          <button type="button" class="buttons-rate__buttons">
            <img
              class="buttons-rate__img-border"
              src="./img/star_border.svg"
              alt="stars"
            />
            <img class="buttons-rate__img" src="./img/star.svg" alt="stars" />
          </button>
          <button type="button" class="buttons-rate__buttons">
            <img
              class="buttons-rate__img-border"
              src="./img/star_border.svg"
              alt="stars"
            />
            <img class="buttons-rate__img" src="./img/star.svg" alt="stars" />
          </button>
          <button type="button" class="buttons-rate__buttons">
            <img
              class="buttons-rate__img-border"
              src="./img/star_border.svg"
              alt="stars"
            />
            <img class="buttons-rate__img" src="./img/star.svg" alt="stars" />
          </button>
          <button type="button" class="buttons-rate__buttons">
            <img
              class="buttons-rate__img-border"
              src="./img/star_border.svg"
              alt="stars"
            />
            <img class="buttons-rate__img" src="./img/star.svg" alt="stars" />
          </button>
          <button type="button" class="buttons-rate__buttons">
            <img
              class="buttons-rate__img-border"
              src="./img/star_border.svg"
              alt="stars"
            />
            <img class="buttons-rate__img" src="./img/star.svg" alt="stars" />
          </button>
        </div>
        <!--Rate Buttons-->
      </section>
      <!--Buttons-->
      <section class="buttons-demo">
        <!--buttons-section-->
        <h3 class="buttons-demo__title">buttons</h3>

        <button type="button" class="button">click me</button>

        <button type="button" class="button button--outline">click me</button>

        <button type="button" class="button button--ghost">click me</button>

        <!-- Исправлен camelCase на дефис -->
        <button type="button" class="button button--full-width">
          перейти к оплате
        </button>
      </section>
    </div>
    <!--Buttons-->
    <!--Dropdown-->
    <div class="block-two">
      <div class="dropdown">
        <span class="dropdown__label">Dropdown</span>
        <div class="dropdown__trigger">
          <input
            placeholder="2 спальни, 2 кровати..."
            class="dropdown__input"
            readonly
          />
        </div>
        <div class="dropdown__expander">
          <div class="dropdown__row">
            <h3 class="dropdown__title">спальни</h3>
            <div class="dropdown__counter">
              <button type="button" class="dropdown__button-minus">-</button>
              <span class="dropdown__span">0</span>
              <button type="button" class="dropdown__button-plus">+</button>
            </div>
          </div>
          <div class="dropdown__row">
            <h3 class="dropdown__title">кровати</h3>
            <div class="dropdown__counter">
              <button type="button" class="dropdown__button-minus">-</button>
              <span class="dropdown__span">0</span>
              <button type="button" class="dropdown__button-plus">+</button>
            </div>
          </div>
          <div class="dropdown__row">
            <h3 class="dropdown__title">ванные комнаты</h3>
            <div class="dropdown__counter">
              <button type="button" class="dropdown__button-minus">-</button>
              <span class="dropdown__span">0</span>
              <button type="button" class="dropdown__button-plus">+</button>
            </div>
          </div>
        </div>
      </div>

      <div class="dropdown">
        <span class="dropdown__label">Dropdown</span>
        <div class="dropdown__trigger">
          <input
            placeholder="Сколько гостей"
            class="dropdown__input"
            readonly
          />
        </div>
        <div class="dropdown__peopleExpander">
          <div>
            <h3 class="dropdown__title">взрослые</h3>
            <div class="dropdown__counter">
              <button type="button" class="dropdown__button-minus">-</button>
              <span class="dropdown__span">0</span>
              <button type="button" class="dropdown__button-plus">+</button>
            </div>
          </div>
          <div>
            <h3 class="dropdown__title">дети</h3>
            <div class="dropdown__counter">
              <button type="button" class="dropdown__button-minus">-</button>
              <span class="dropdown__span">0</span>
              <button type="button" class="dropdown__button-plus">+</button>
            </div>
          </div>
          <div>
            <h3 class="dropdown__title">младенцы</h3>
            <div class="dropdown__counter">
              <button type="button" class="dropdown__button-minus">-</button>
              <span class="dropdown__span">0</span>
              <button type="button" class="dropdown__button-plus">+</button>
            </div>
          </div>
          <div class="dropdown__buttons">
            <button type="button" class="dropdown__btn-clean">очистить</button>
            <button type="button" class="dropdown__btn-apply">применить</button>
          </div>
        </div>
      </div>
    </div>
    <!--Dropdown-->
    <!--==================== JAVASCRIPT ====================-->
    <script src="./scriptui.js"></script>
  </body>
</html>
